name: Verify Unwritten

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run deterministic verification
        run: npm run check

      - name: Upload standalone judge artifact
        uses: actions/upload-artifact@v4
        with:
          name: unwritten-judge-demo
          path: dist/index.html
